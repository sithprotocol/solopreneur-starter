services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_DB: starter_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U starter -d starter_test']
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://starter:starter@postgres:5432/starter_test?schema=public
      FRONTEND_URL: http://web:3000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3001:3001'

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:3001
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api
    ports:
      - '3000:3000'
